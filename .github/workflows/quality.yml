name: Checks

on:
  - push

jobs:
  code-style:
    name: Code style
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP project
        uses: ./.github/actions/setup-php

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Check code style for PHP
        run: composer csPHP

      - name: Verify PSR-4 compliance of all PHP classes
        run: composer dump-autoload --strict-psr --no-scripts

      - name: Check code style for CSS and JavaScript
        run: npm run cs

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP project
        uses: ./.github/actions/setup-php

      - name: Run static analysis for PHP
        run: composer stan

  tests:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write # necessary to publish results in PR

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.4
          - 8.5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: ./.github/actions/setup-php
        with:
          php-version: ${{ matrix.php-version }}
          coverage: ${{ matrix.php-version == '8.5' && 'xdebug' || 'none' }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Build
        run: npm run build

      - name: Run tests (older supported PHP versions)
        if: matrix.php-version != '8.5'
        run: |
          vendor/bin/paratest --exclude-group serial
          vendor/bin/phpunit --group serial

      - name: Run tests with coverage (latest PHP version only)
        if: matrix.php-version == '8.5'
        run: |
          vendor/bin/paratest --exclude-group serial --coverage-clover phpunit_coverage.xml --log-junit phpunit_report.xml
          vendor/bin/phpunit --group serial

      - name: Upload coverage report to GitHub Artifacts
        id: artifact-upload-step
        if: matrix.php-version == '8.5'
        uses: actions/upload-artifact@v7
        with:
          name: Code coverage report (PHP ${{ matrix.php-version }})
          path: |
            phpunit_coverage.xml
            phpunit_report.xml
          if-no-files-found: warn

      - name: Calculate coverage percentage
        if: matrix.php-version == '8.5'
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('phpunit_coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$covered = (int) \$metrics['coveredelements'];
            \$total = (int) \$metrics['elements'];
            echo \$total > 0 ? round((\$covered / \$total) * 100, 2) : 0;
          ")
          echo "COVERAGE=$COVERAGE"
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Comment test results in PR
        if: matrix.php-version == '8.5'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: phpunit_report.xml
          check_run: false # disabled because of https://github.com/EnricoMi/publish-unit-test-result-action/issues/12
          comment_title: "Test results (coverage: ${{ env.COVERAGE }}%)"

  translations:
    name: Translations
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP project
        uses: ./.github/actions/setup-php

      - name: Extract translations and fail if this caused a diff
        run: |
          composer translate
          git diff --exit-code lang/
